name: Publish GitHub release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag in vX.Y.Z format
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match v<major>.<minor>.<patch>."
            exit 1
          fi

          version="${tag#v}"
          project_version="$(grep -oPm1 '(?<=<Version>)[^<]+' Frends.Qconn.ModbusTcp/Frends.Qconn.ModbusTcp.csproj)"

          if [ -z "$project_version" ]; then
            echo "Could not determine the project version from Frends.Qconn.ModbusTcp.csproj."
            exit 1
          fi

          if [ "$version" != "$project_version" ]; then
            echo "Tag version $version does not match project version $project_version."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build Frends.Qconn.ModbusTcp.sln --configuration Release

      - name: Test
        run: dotnet test Frends.Qconn.ModbusTcp.sln --configuration Release --no-build

      - name: Pack
        run: dotnet pack Frends.Qconn.ModbusTcp/Frends.Qconn.ModbusTcp.csproj --configuration Release --no-build --include-source --output artifacts

      - name: Extract release notes from changelog
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for release details." > release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Frends.Qconn.ModbusTcp v${{ steps.release.outputs.version }}
          body_path: release-notes.md
          files: artifacts/*.nupkg
