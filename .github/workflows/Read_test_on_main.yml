name: Build on main
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'Frends.Qconn.ModbusTcp/**'
      - 'Frends.Qconn.ModbusTcp.Tests/**'
      - 'Frends.Qconn.ModbusTcp.sln'
      - '.github/workflows/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'SECURITY.md'
  workflow_dispatch:

jobs:
  build:
    uses: FrendsPlatform/FrendsTasks/.github/workflows/linux_build_main.yml@main
    with:
      workdir: .
      dotnet_version: 8.0.x
      strict_analyzers: false
    secrets:
      badge_service_api_key: ${{ secrets.BADGE_SERVICE_API_KEY }}
