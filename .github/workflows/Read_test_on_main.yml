name: Read_test_on_main
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'Frends.Qconn.ModbusTcp.Read/**'
  workflow_dispatch:

jobs:
  build:
    uses: FrendsPlatform/FrendsTasks/.github/workflows/linux_build_main.yml@main
    with:
      workdir: Frends.Qconn.ModbusTcp.Read
      dotnet_version: 8.0.x
      strict_analyzers: true
    secrets:
      badge_service_api_key: ${{ secrets.BADGE_SERVICE_API_KEY }}
